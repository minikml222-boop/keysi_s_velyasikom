<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ВХОД | САМАЯ ПОТНАЯ ИГРА</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            background: radial-gradient(circle, #0d1117 0%, #010409 100%);
            color: #fff;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-screen {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.1rem;
            color: #ffd966;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 217, 102, 0.3);
        }
        .photo-frame {
            width: 250px;
            height: 250px;
            margin: 0 auto 30px;
            border: 4px solid #7a6a3a;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .start-btn {
            background: #7a6a3a;
            color: #fff;
            border: none;
            padding: 16px 45px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .start-btn:active { transform: scale(0.9); }
        
        .game-container { display: none; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen">
        <h1>самая потная игра в жизни каждого</h1>
        <div class="photo-frame">
            <img src="images(3).jpg" alt="Потный чел">
        </div>
        <button class="start-btn" onclick="enterGame()">ВОЙТИ В IT</button>
    </div>

    <script>
        function enterGame() {
            // Перенаправляем на файл с игрой
            // Убедись, что основной файл игры называется game.html
            window.location.href = "game.html";
        }
    </script>
</body>
</html
