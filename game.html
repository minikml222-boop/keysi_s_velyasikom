<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ВЕЛЯСИК CASE SIMULATOR</title>
    <style>
        :root {
            --common: #b5b5b5; --rare: #4b69ff; --mythical: #d32ce6; --legendary: #eb4b4b; --gold: #ffd700;
        }
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; color: white;
        }
        .container {
            background: #161625; width: 100%; max-width: 450px; padding: 20px;
            border-radius: 30px; border: 2px solid #2e2e4a; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }
        .balance { color: var(--gold); font-size: 1.2rem; }

        /* Кнопка фарма денег */
        .btn-farm {
            background: linear-gradient(145deg, #28a745, #1e7e34);
            color: white; border: none; padding: 12px; width: 100%;
            border-radius: 15px; font-weight: bold; cursor: pointer;
            margin-bottom: 15px; box-shadow: 0 4px 0 #155d27;
            transition: 0.1s;
        }
        .btn-farm:active { transform: translateY(2px); box-shadow: 0 2px 0 #155d27; }

        .case-visual {
            width: 150px; height: 150px; margin: 15px auto;
            background: linear-gradient(45deg, #2e2e4a, #1a1a2e);
            border-radius: 20px; display: flex; justify-content: center;
            align-items: center; font-size: 4rem; border: 3px solid var(--gold);
            cursor: pointer; transition: 0.2s; position: relative;
        }
        .case-visual.shaking { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: rotate(0); } 25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); } 100% { transform: rotate(0); }
        }

        .drop-list {
            background: #0f0f1a; border-radius: 15px; padding: 15px;
            margin-top: 20px; height: 180px; overflow-y: auto; text-align: left;
            border: 1px solid #2e2e4a;
        }
        .drop-item {
            padding: 8px; border-bottom: 1px solid #222; display: flex;
            justify-content: space-between; font-size: 0.9rem;
        }
        .btn-open {
            background: var(--gold); color: black; border: none; padding: 15px;
            border-radius: 50px; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; width: 100%; margin-top: 10px;
            box-shadow: 0 5px 0 #b89b00;
        }
        .btn-open:disabled { background: #555; box-shadow: none; cursor: default; }
        .rarity-tag { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats">
        <div class="balance">💰 <span id="balance">0</span></div>
        <div style="color: #aaa">Инвентарь: <span id="invCount">0</span></div>
    </div>

    <button class="btn-farm" onclick="addMoney()">👷 РАБОТАТЬ (+25💰)</button>

    <h2 id="status" style="font-size: 1rem; color: #ffd966;">НУЖНО 100💰 НА КЕЙС</h2>
    
    <div class="case-visual" id="caseBox">📦</div>

    <button class="btn-open" id="openBtn" onclick="openCase()">ОТКРЫТЬ (100💰)</button>

    <div class="drop-list" id="inventory">
        <div style="color: #444; text-align: center; margin-top: 60px;">Тут будут твои шмотки</div>
    </div>
</div>

<script>
    let balance = 0;
    let inventory = [];

    const loot = [
        { name: "Ржавая цепь", rarity: "common", color: "#b5b5b5", chance: 50 },
        { name: "Сломанная педаль", rarity: "common", color: "#b5b5b5", chance: 30 },
        { name: "Сидушка с Али", rarity: "rare", color: "#4b69ff", chance: 15 },
        { name: "Горный руль", rarity: "mythical", color: "#d32ce6", chance: 4 },
        { name: "ЗОЛОТОЙ ВЕЛЯСИК", rarity: "legendary", color: "#eb4b4b", chance: 1 }
    ];

    // ФУНКЦИЯ ДЛЯ ЗАРАБОТКА
    function addMoney() {
        balance += 25;
        updateUI();
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
        document.getElementById('invCount').innerText = inventory.length;
        document.getElementById('openBtn').disabled = (balance < 100);
    }

    function openCase() {
        if (balance < 100) return;
        balance -= 100;
        updateUI();
        
        const openBtn = document.getElementById('openBtn');
        const caseBox = document.getElementById('caseBox');
        const statusEl = document.getElementById('status');

        openBtn.disabled = true;
        caseBox.classList.add('shaking');
        statusEl.innerText = "ОТКРЫВАЕМ...";
        caseBox.innerText = "📦";

        setTimeout(() => {
            caseBox.classList.remove('shaking');
            const rolled = getLoot();
            inventory.unshift(rolled);
            
            caseBox.innerText = rolled.name.includes("ВЕЛЯСИК") ? "🚲" : "⚙️";
            caseBox.style.borderColor = rolled.color;
            statusEl.innerText = rolled.name;
            statusEl.style.color = rolled.color;
            
            renderInventory();
            openBtn.disabled = (balance < 100);
            
            if (rolled.rarity === 'legendary') balance += 1000; // Бонус за Велясик!
            updateUI();
        }, 1200);
    }

    function getLoot() {
        const rand = Math.random() * 100;
        let cumulative = 0;
        for (const item of loot) {
            cumulative += item.chance;
            if (rand <= cumulative) return item;
        }
        return loot[0];
    }

    function renderInventory() {
        const invEl = document.getElementById('inventory');
        invEl.innerHTML = inventory.map(item => `
            <div class="drop-item">
                <span style="color:${item.color}">${item.name}</span>
                <span class="rarity-tag" style="background:${item.color}">${item.rarity}</span>
            </div>
        `).join('');
    }

    updateUI(); // При загрузке проверим баланс
</script>

</body>
</html>
